<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Kanban - Gestor de Tareas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css"
        integrity="sha512-q3eWabyZPc1XTCmF+8/LuE1ozpg5xxn7iO89yfSOd5/oKvyqLngoNGsx8jq92Y8eXJ/IRxQbEC+FGSYxtk2oiw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../styles/kanban.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand font-weight-bold" href="/">
            <i class="fas fa-tasks"></i> Gestor de Tareas
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
        </div>
    </nav>
    <script type="module" src="../js/components/navbarComponent.js"></script>

    <!-- Tablero Kanban -->
    <main class="container-fluid my-4 flex-grow-1">
        <div class="row">
            <!-- Columna: Urgentes -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="kanban-column">
                    <div class="kanban-header kanban-urgente">
                        <i class="fas fa-exclamation-circle"></i> Urgentes
                        <span class="badge badge-light float-right">0</span>
                    </div>
                    <button class="add-task-btn">
                        <i class="fas fa-plus"></i> Agregar tarea
                    </button>
                </div>
            </div>

            <!-- Columna: Normales -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="kanban-column">
                    <div class="kanban-header kanban-normal">
                        <i class="fas fa-tasks"></i> Normales
                        <span class="badge badge-light float-right">0</span>
                    </div>
                    <button class="add-task-btn">
                        <i class="fas fa-plus"></i> Agregar tarea
                    </button>
                </div>
            </div>

            <!-- Columna: Baja Prioridad -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="kanban-column">
                    <div class="kanban-header kanban-baja">
                        <i class="fas fa-clock"></i> Baja Prioridad
                        <span class="badge badge-light float-right">0</span>
                    </div>
                    <button class="add-task-btn">
                        <i class="fas fa-plus"></i> Agregar tarea
                    </button>
                </div>
            </div>

            <!-- Columna: Completadas -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="kanban-column">
                    <div class="kanban-header kanban-completada">
                        <i class="fas fa-check-circle"></i> Completadas
                        <span class="badge badge-light float-right">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        &copy; 2026 Gestor de Tareas | contacto@gestordetareas.com
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
    <script type="module" src="../js/components/kanbanComponent.js"></script>
</body>
</html>
